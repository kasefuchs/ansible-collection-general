---
- name: Get latest sing-box version
  when: singbox_download_version == "latest"
  block:
    - name: Fetch latest sing-box release on GitHub
      register: singbox_download_github_release
      community.general.github_release:
        user: "{{ singbox_download_github_user }}"
        repo: "{{ singbox_download_github_repository }}"
        token: "{{ lookup('ansible.builtin.env', 'ANSIBLE_GITHUB_API_TOKEN') }}"
        action: latest_release

    - name: Set sing-box version fact
      ansible.builtin.set_fact:
        singbox_download_version: "{{ singbox_download_github_release.tag | ansible.builtin.regex_replace('^v', '') }}"

- name: Download sing-box archive
  ansible.builtin.include_role:
    name: kasefuchs.general.download
  vars:
    download_dir: "{{ singbox_download_local_dir }}"
    download_url: "{{ singbox_download_url }}"
    download_version: "{{ singbox_download_version }}"
    download_architecture_map: "{{ singbox_download_architecture_map }}"
