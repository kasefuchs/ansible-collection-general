---
- name: Create sing-box directories
  loop:
    - "{{ singbox_config_dir }}"
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
    state: directory
    owner: root
    group: root

- name: Extract sing-box archive
  ansible.builtin.unarchive:
    src: "{{ singbox_download_local_file }}"
    dest: "{{ common_binary_dir }}"
    mode: "0755"
    owner: root
    group: root
    include: "{{ singbox_install_extract_include }}"
    extra_opts: "{{ singbox_install_extract_options }}"

- name: Install sing-box service
  notify: Reload daemon
  block:
    - name: Install sing-box service (systemd)
      when: ansible_facts.service_mgr == "systemd"
      ansible.builtin.template:
        src: sing-box@.service.j2
        dest: /etc/systemd/system/sing-box@.service
        owner: root
        group: root
        mode: "0644"
