---
# Name of the generated configuration file.
singbox_config_instance: default

# Main sing-box configuration structure.
singbox_config:
  log: "{{ singbox_config_log }}"
  dns: "{{ singbox_config_dns }}"
  inbounds: "{{ singbox_config_inbounds }}"
  outbounds: "{{ singbox_config_outbounds }}"
  route: "{{ singbox_config_route }}"
  experimental: "{{ singbox_config_experimental }}"

# Logging settings.
singbox_config_log:
  level: error
  timestamp: true

# DNS configuration.
singbox_config_dns:
  final: https
  servers: "{{ singbox_config_dns_servers }}"
  rules: "{{ singbox_config_dns_rules }}"

# List of DNS resolvers.
singbox_config_dns_servers:
  - tag: tcp
    type: tcp
    server: 8.8.8.8
  - tag: https
    type: https
    server: dns.quad9.net
    domain_resolver: tcp

# Rules controlling how DNS queries are handled.
singbox_config_dns_rules:
  - query_type: HTTPS
    action: predefined
    rcode: NOERROR

# Inbound listeners.
singbox_config_inbounds:
  - tag: tun
    type: tun
    stack: mixed
    address: 172.19.0.1/30
    auto_route: true
    strict_route: true
    auto_redirect: true
    auto_redirect_input_mark: "0x2023"
    auto_redirect_output_mark: "0x2024"
    endpoint_independent_nat: false
    interface_name: sb0

# Outbound connections.
singbox_config_outbounds:
  - tag: direct
    type: direct

# Routing settings.
singbox_config_route:
  final: direct
  auto_detect_interface: true
  default_domain_resolver:
    server: https
  rules: "{{ singbox_config_route_rules }}"
  rule_set: "{{ singbox_config_route_rule_sets }}"

# Rules controlling routing actions.
singbox_config_route_rules:
  - action: sniff
  - action: hijack-dns
    protocol: dns

# External rule sets.
singbox_config_route_rule_sets: []

# Experimental features.
singbox_config_experimental:
  cache_file:
    enabled: true
