---
# Directory containing currently used version.
download_current_dir: "{{ (download_dir, download_version) | ansible.builtin.path_join }}"

# Symlink path pointing to the currently used version.
download_current_dir_link: "{{ (download_dir, 'current') | ansible.builtin.path_join }}"

# Unique architectures plus 'noarch' placeholder for arch-independent downloads.
download_unique_architectures: "{{ common_unique_architectures + ['noarch'] }}"
